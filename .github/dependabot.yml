version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 1
    groups:
      major-dependencies:
        applies-to: version-updates
        update-types:
          - "major"
      minor-dependencies:
        applies-to: version-updates
        update-types:
          - "minor"
      patch-dependencies:
        applies-to: version-updates
        update-types:
          - "patch"
